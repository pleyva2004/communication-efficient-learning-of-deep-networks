name: Render LaTeX

on:
  push:
    branches: [main]
    paths:
      - '**.tex'
      - '**.bib'
      - '.github/workflows/render.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  structure:
    runs-on: ubuntu-latest
    outputs:
      has_tour: ${{ steps.detect.outputs.has_tour }}
      has_proofs: ${{ steps.detect.outputs.has_proofs }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f learning-map/tour.tex ]; then
            echo "has_tour=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tour=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "proofs/*.tex" > /dev/null; then
            echo "has_proofs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_proofs=false" >> "$GITHUB_OUTPUT"
          fi

  render:
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4

      - name: Compile literature review
        if: hashFiles('04-literature-review.tex') != ''
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 04-literature-review.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile improvements
        if: hashFiles('05-improvements.tex') != ''
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 05-improvements.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile interview handout
        if: hashFiles('interview-handout.tex') != ''
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          root_file: interview-handout.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Stage generated PDFs in pdfs/
        run: |
          mkdir -p pdfs
          for f in 04-literature-review.pdf 05-improvements.pdf interview-handout.pdf; do
            if [ -f "$f" ]; then
              mv "$f" "pdfs/$f"
              echo "Moved $f -> pdfs/"
            fi
          done
          ls -la pdfs/

      - uses: actions/upload-artifact@v4
        with:
          name: lesson-pdfs
          path: pdfs/
          if-no-files-found: ignore

  render-tour:
    runs-on: ubuntu-latest
    needs: structure
    if: needs.structure.outputs.has_tour == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Compile tour
        uses: xu-cheng/latex-action@v3
        with:
          root_file: learning-map/tour.tex
          working_directory: learning-map
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - uses: actions/upload-artifact@v4
        with:
          name: tour-pdf
          path: learning-map/tour.pdf
          if-no-files-found: ignore

  render-proofs:
    runs-on: ubuntu-latest
    needs: structure
    if: needs.structure.outputs.has_proofs == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-fonts-recommended \
            texlive-latex-extra texlive-science latexmk

      - name: Compile every proof
        run: |
          mkdir -p proofs
          rc=0
          for f in proofs/*.tex; do
            [ -f "$f" ] || continue
            echo "Compiling $f"
            if ! (cd proofs && latexmk -pdf -interaction=nonstopmode -file-line-error "$(basename "$f")"); then
              echo "::warning::proof $f failed to compile"
              rc=1
            fi
          done
          ls -la proofs/
          # Don't fail the job on a single bad proof — upload whatever compiled.
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: proof-pdfs
          path: proofs/*.pdf
          if-no-files-found: ignore

  commit-pdfs:
    runs-on: ubuntu-latest
    needs: [render, render-tour, render-proofs]
    if: always() && (needs.render.result == 'success' || needs.render-tour.result == 'success' || needs.render-proofs.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lesson-pdfs
          path: pdfs/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: tour-pdf
          path: learning-map/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: proof-pdfs
          path: proofs/
        continue-on-error: true

      - name: Commit and push PDFs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Add each location independently and force past .gitignore, so one
          # missing/ignored path can never abort staging of the others.
          git add -f pdfs/ 2>/dev/null || true
          git add -f learning-map/tour.pdf 2>/dev/null || true
          git add -f proofs/*.pdf 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "render: update compiled PDFs [skip ci]"
            git push
          fi
